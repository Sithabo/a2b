<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>A2B Payment Method Selection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#1A4D2E", // Deep Forest Green
              "primary-hover": "#143D23",
              "background-light": "#F9F8F2", // Ivory
              "background-dark": "#121212", // Dark background
              "card-light": "#FFFFFF",
              "card-dark": "#1E1E1E",
              "text-primary-light": "#1F2937",
              "text-primary-dark": "#F3F4F6",
              "text-secondary-light": "#6B7280",
              "text-secondary-dark": "#9CA3AF",
              "accent-mtn": "#FFCC00",
              "accent-airtel": "#FF0000",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
              sans: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.5rem",
              'xl': '1rem',
              '2xl': '1.5rem',
            },
            boxShadow: {
              'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
            }
          },
        },
      };
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-sans transition-colors duration-200 min-h-screen flex items-center justify-center p-4">
<main class="w-full max-w-md mx-auto bg-background-light dark:bg-background-dark min-h-[800px] flex flex-col relative overflow-hidden">
<header class="pt-8 pb-6 px-6">
<h1 class="text-2xl font-bold text-primary dark:text-green-400 mb-2">Choose Payment Method</h1>
<p class="text-text-secondary-light dark:text-text-secondary-dark text-sm">Select how you want to pay the driver</p>
</header>
<div class="flex-1 px-6 space-y-6">
<div class="bg-card-light dark:bg-card-dark rounded-2xl p-6 shadow-soft text-center border border-gray-100 dark:border-gray-700">
<p class="text-text-secondary-light dark:text-text-secondary-dark text-sm font-medium mb-2">Amount to Pay Driver</p>
<div class="flex flex-col items-center justify-center">
<span class="text-4xl font-bold text-primary dark:text-white tracking-tight">150,000</span>
<span class="text-xs font-semibold text-text-secondary-light dark:text-gray-400 mt-1 uppercase tracking-wide">UGX</span>
</div>
</div>
<div class="space-y-4">
<button class="w-full bg-card-light dark:bg-card-dark hover:bg-gray-50 dark:hover:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 flex items-center shadow-sm transition-all duration-200 group active:scale-[0.98]">
<div class="w-14 h-14 bg-accent-mtn rounded-lg flex items-center justify-center flex-shrink-0 mr-4 shadow-sm group-hover:shadow-md transition-shadow">
<span class="font-bold text-black text-xs">MTN</span>
</div>
<div class="text-left flex-1">
<h3 class="font-bold text-text-primary-light dark:text-text-primary-dark text-lg">MTN Mobile Money</h3>
<p class="text-xs text-text-secondary-light dark:text-text-secondary-dark">Fast and secure</p>
</div>
<span class="material-icons-outlined text-gray-400 dark:text-gray-500">chevron_right</span>
</button>
<button class="w-full bg-card-light dark:bg-card-dark hover:bg-gray-50 dark:hover:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 flex items-center shadow-sm transition-all duration-200 group active:scale-[0.98]">
<div class="w-14 h-14 bg-accent-airtel rounded-lg flex items-center justify-center flex-shrink-0 mr-4 shadow-sm group-hover:shadow-md transition-shadow">
<span class="font-bold text-white text-xs">Airtel</span>
</div>
<div class="text-left flex-1">
<h3 class="font-bold text-text-primary-light dark:text-text-primary-dark text-lg">Airtel Money</h3>
<p class="text-xs text-text-secondary-light dark:text-text-secondary-dark">Quick transactions</p>
</div>
<span class="material-icons-outlined text-gray-400 dark:text-gray-500">chevron_right</span>
</button>
<button class="w-full bg-card-light dark:bg-card-dark hover:bg-gray-50 dark:hover:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 flex items-center shadow-sm transition-all duration-200 group active:scale-[0.98]">
<div class="w-14 h-14 bg-gray-800 dark:bg-gray-700 rounded-lg flex items-center justify-center flex-shrink-0 mr-4 shadow-sm group-hover:shadow-md transition-shadow">
<span class="material-icons-outlined text-white text-2xl">credit_card</span>
</div>
<div class="text-left flex-1">
<h3 class="font-bold text-text-primary-light dark:text-text-primary-dark text-lg">Debit/Credit Card</h3>
<p class="text-xs text-text-secondary-light dark:text-text-secondary-dark">Visa, Mastercard</p>
</div>
<span class="material-icons-outlined text-gray-400 dark:text-gray-500">chevron_right</span>
</button>
</div>
<div class="mt-8 flex items-center justify-center gap-2 text-xs text-text-secondary-light dark:text-gray-500 opacity-80">
<span class="material-icons-outlined text-primary dark:text-green-400 text-sm">lock</span>
<span>Payments are secured by Escrow Protection</span>
</div>
</div>
<nav class="bg-card-light dark:bg-card-dark border-t border-gray-200 dark:border-gray-700 h-20 px-6 flex items-center justify-between mt-auto">
<button class="flex flex-col items-center justify-center text-gray-400 hover:text-primary dark:hover:text-green-400 transition-colors">
<span class="material-icons-outlined text-2xl">home</span>
</button>
<button class="flex flex-col items-center justify-center text-primary dark:text-green-400 transition-colors relative">
<span class="material-icons-outlined text-2xl">receipt_long</span>
<span class="absolute -bottom-2 w-1 h-1 bg-primary dark:bg-green-400 rounded-full"></span>
</button>
<button class="flex flex-col items-center justify-center text-gray-400 hover:text-primary dark:hover:text-green-400 transition-colors">
<span class="material-icons-outlined text-2xl">person</span>
</button>
</nav>
<div class="bg-background-light dark:bg-background-dark w-full h-6 flex justify-center items-end pb-2 absolute bottom-0 z-10 pointer-events-none">
<div class="w-1/3 h-1 bg-gray-300 dark:bg-gray-600 rounded-full"></div>
</div>
</main>
</body></html>
