<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>A2B Post a Load</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#143D28", // Deep Forest Green from description/screenshot
                        accent: "#DFA818", // Gold/Mustard accent
                        "background-light": "#F7F6F2", // Ivory/off-white background
                        "background-dark": "#121212", // Dark mode background
                        "surface-light": "#FFFFFF",
                        "surface-dark": "#1E1E1E",
                        "input-border-light": "#E5E7EB",
                        "input-border-dark": "#374151",
                        "text-main-light": "#111827",
                        "text-main-dark": "#F9FAFB",
                        "text-sub-light": "#6B7280",
                        "text-sub-dark": "#9CA3AF",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                        sans: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        'xl': '0.75rem',
                        '2xl': '1rem',
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                    }
                },
            },
        };
    </script>
<style>.hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-sans min-h-screen text-text-main-light dark:text-text-main-dark antialiased pb-24">
<div class="h-12 w-full bg-background-light dark:bg-background-dark sticky top-0 z-20 flex items-end justify-between px-6 pb-2">
<span class="text-xs font-semibold">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-icons-round text-sm">signal_cellular_alt</span>
<span class="material-icons-round text-sm">wifi</span>
<span class="material-icons-round text-sm">battery_full</span>
</div>
</div>
<header class="px-6 pt-4 pb-2 sticky top-12 z-10 bg-background-light dark:bg-background-dark">
<div class="flex items-center gap-4">
<button class="p-2 -ml-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors">
<span class="material-icons-round text-2xl">arrow_back</span>
</button>
<div>
<h1 class="text-xl font-bold leading-tight">Post a Load</h1>
<p class="text-sm text-text-sub-light dark:text-text-sub-dark mt-0.5">Tell us what you need to ship</p>
</div>
</div>
</header>
<main class="px-5 mt-4 space-y-6">
<div class="bg-surface-light dark:bg-surface-dark rounded-xl p-5 shadow-soft border border-gray-100 dark:border-gray-800 space-y-4">
<div class="relative">
<label class="block text-xs font-semibold text-text-sub-light dark:text-text-sub-dark uppercase tracking-wide mb-1.5 ml-1">
<span class="flex items-center gap-1"><span class="material-icons-round text-sm text-primary">trip_origin</span> Pickup Location</span>
</label>
<div class="relative">
<input class="w-full pl-3 pr-4 py-3.5 bg-gray-50 dark:bg-gray-800 border border-input-border-light dark:border-input-border-dark rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent dark:text-white placeholder-gray-400 dark:placeholder-gray-500 transition-all" placeholder="e.g., Kampala, Makindye District" type="text"/>
</div>
</div>
<div class="absolute left-[34px] mt-[-10px] h-8 border-l-2 border-dashed border-gray-300 dark:border-gray-600 z-0"></div>
<div class="relative z-10">
<label class="block text-xs font-semibold text-text-sub-light dark:text-text-sub-dark uppercase tracking-wide mb-1.5 ml-1">
<span class="flex items-center gap-1"><span class="material-icons-round text-sm text-accent">location_on</span> Delivery Location</span>
</label>
<div class="relative">
<input class="w-full pl-3 pr-4 py-3.5 bg-gray-50 dark:bg-gray-800 border border-input-border-light dark:border-input-border-dark rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent dark:text-white placeholder-gray-400 dark:placeholder-gray-500 transition-all" placeholder="e.g., Jinja, Industrial Area" type="text"/>
</div>
</div>
</div>
<div class="bg-surface-light dark:bg-surface-dark rounded-xl p-5 shadow-soft border border-gray-100 dark:border-gray-800 space-y-4">
<div>
<label class="block text-xs font-semibold text-text-sub-light dark:text-text-sub-dark uppercase tracking-wide mb-1.5 ml-1">
<span class="flex items-center gap-1"><span class="material-icons-round text-sm">inventory_2</span> Load Details</span>
</label>
<input class="w-full px-4 py-3.5 bg-gray-50 dark:bg-gray-800 border border-input-border-light dark:border-input-border-dark rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent dark:text-white placeholder-gray-400 dark:placeholder-gray-500 transition-all" placeholder="e.g., Rice bags (50kg x 10)" type="text"/>
<div class="flex gap-2 mt-3 overflow-x-auto hide-scrollbar pb-1">
<button class="flex-shrink-0 px-3 py-1.5 bg-primary text-white text-xs font-medium rounded-full border border-primary">Sacks</button>
<button class="flex-shrink-0 px-3 py-1.5 bg-white dark:bg-gray-700 text-text-sub-light dark:text-gray-300 border border-gray-200 dark:border-gray-600 text-xs font-medium rounded-full">Boxes</button>
<button class="flex-shrink-0 px-3 py-1.5 bg-white dark:bg-gray-700 text-text-sub-light dark:text-gray-300 border border-gray-200 dark:border-gray-600 text-xs font-medium rounded-full">Machinery</button>
<button class="flex-shrink-0 px-3 py-1.5 bg-white dark:bg-gray-700 text-text-sub-light dark:text-gray-300 border border-gray-200 dark:border-gray-600 text-xs font-medium rounded-full">Furniture</button>
</div>
</div>
<div>
<label class="block text-xs font-semibold text-text-sub-light dark:text-text-sub-dark uppercase tracking-wide mb-1.5 ml-1">
<span class="flex items-center gap-1"><span class="material-icons-round text-sm">scale</span> Weight</span>
</label>
<input class="w-full px-4 py-3.5 bg-gray-50 dark:bg-gray-800 border border-input-border-light dark:border-input-border-dark rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent dark:text-white placeholder-gray-400 dark:placeholder-gray-500 transition-all" placeholder="e.g., 500 kg" type="text"/>
</div>
</div>
<div class="bg-surface-light dark:bg-surface-dark rounded-xl p-5 shadow-soft border border-gray-100 dark:border-gray-800">
<label class="block text-xs font-semibold text-text-sub-light dark:text-text-sub-dark uppercase tracking-wide mb-2 ml-1">
<span class="flex items-center gap-1"><span class="material-icons-round text-sm text-accent">payments</span> Your Offer Price (UGX)</span>
</label>
<div class="relative">
<input class="w-full px-4 py-4 bg-white dark:bg-gray-800 border-2 border-accent rounded-lg text-lg font-bold text-gray-900 dark:text-white focus:ring-2 focus:ring-accent focus:border-accent placeholder-gray-300 dark:placeholder-gray-600 transition-all shadow-sm" placeholder="150,000" type="number"/>
<div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
<span class="text-gray-400 font-medium text-xs uppercase">UGX</span>
</div>
</div>
<p class="text-xs text-text-sub-light dark:text-text-sub-dark mt-2 ml-1 flex items-center gap-1">
<span class="material-icons-round text-[14px]">info</span>
                This is what drivers will see and decide to accept.
            </p>
</div>
<div class="bg-surface-light dark:bg-surface-dark rounded-xl p-5 shadow-soft border border-gray-100 dark:border-gray-800">
<label class="block text-xs font-semibold text-text-sub-light dark:text-text-sub-dark uppercase tracking-wide mb-1.5 ml-1">
                Notes (Optional)
            </label>
<textarea class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-800 border border-input-border-light dark:border-input-border-dark rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent dark:text-white placeholder-gray-400 dark:placeholder-gray-500 transition-all resize-none" placeholder="e.g., Handle with care, fragile items..." rows="3"></textarea>
</div>
</main>
<div class="fixed bottom-0 left-0 right-0 p-4 bg-surface-light dark:bg-surface-dark border-t border-gray-200 dark:border-gray-800 pb-8 z-30">
<button class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg hover:bg-opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-base">
            Next: Review Offer
            <span class="material-icons-round text-sm">arrow_forward</span>
</button>
</div>

</body></html>
