<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>A2B Payment Confirmation</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#0F3D26", // Deep Forest Green
                        "primary-hover": "#0a291a",
                        "accent-light": "#F0F0E6", // Light inset card bg
                        "accent-dark": "#1a1a1a", // Dark mode inset card bg
                        "background-light": "#F5F5E9", // Ivory
                        "background-dark": "#121212", // Dark Mode Background
                        "card-light": "#FFFFFF",
                        "card-dark": "#1E1E1E",
                        "text-secondary-light": "#6B7280",
                        "text-secondary-dark": "#9CA3AF",
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'card': '0 10px 30px -5px rgba(15, 61, 38, 0.08)',
                    }
                },
            },
        };
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-center font-sans antialiased selection:bg-primary selection:text-white">
<main class="w-full max-w-md min-h-screen flex flex-col relative overflow-hidden bg-background-light dark:bg-background-dark">
<div class="flex-1 px-5 pt-12 pb-24 flex items-center justify-center">
<div class="bg-card-light dark:bg-card-dark rounded-3xl w-full p-6 shadow-card flex flex-col items-center text-center transition-colors duration-300">
<div class="w-20 h-20 bg-primary rounded-full flex items-center justify-center mb-6 shadow-lg shadow-primary/20">
<span class="material-icons-round text-white text-5xl">check</span>
</div>
<h1 class="text-2xl font-extrabold text-primary dark:text-white mb-2 tracking-tight">
                    Payment Confirmed!
                </h1>
<p class="text-text-secondary-light dark:text-text-secondary-dark text-sm mb-8 font-medium">
                    Your deposit is secured in escrow
                </p>
<div class="w-full bg-accent-light dark:bg-accent-dark rounded-xl p-6 mb-6">
<p class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-1">
                        Amount Deposited
                    </p>
<div class="text-4xl font-extrabold text-primary dark:text-white mb-1">
                        150,000
                    </div>
<p class="text-xs text-gray-500 dark:text-gray-400 font-medium flex items-center justify-center gap-1">
                        via MTN Mobile Money
                    </p>
</div>
<div class="w-full bg-[#FFFBF0] dark:bg-[#2C2518] border border-[#FDE6C8] dark:border-[#4A3B26] rounded-xl p-4 mb-8">
<p class="text-xs text-gray-700 dark:text-gray-300 leading-relaxed">
                        Driver details have been unlocked and they are heading to pickup. You will receive updates as they progress through the delivery.
                    </p>
</div>
<div class="w-full space-y-3">
<button class="w-full bg-primary hover:bg-primary-hover text-white font-bold py-4 px-6 rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transition-transform active:scale-[0.98]">
<span class="material-icons-round text-xl">call</span>
                        Call Driver
                    </button>
<button class="w-full bg-transparent border-2 border-primary text-primary dark:border-white dark:text-white font-bold py-4 px-6 rounded-xl hover:bg-primary/5 dark:hover:bg-white/10 flex items-center justify-center gap-2 transition-transform active:scale-[0.98]">
<span class="material-icons-round text-xl">inventory_2</span>
                        See Pending Shipments
                    </button>
</div>
</div>
</div>
<nav class="fixed bottom-0 left-0 w-full bg-card-light dark:bg-card-dark border-t border-gray-100 dark:border-gray-800 pb-safe safe-area-bottom z-10 transition-colors duration-300">
<div class="flex justify-around items-center h-16 max-w-md mx-auto px-2">
<a class="flex flex-col items-center justify-center w-full h-full text-primary dark:text-white group" href="#">
<span class="material-icons-round text-3xl group-hover:scale-110 transition-transform">home</span>
</a>
<a class="flex flex-col items-center justify-center w-full h-full text-gray-400 dark:text-gray-500 hover:text-primary dark:hover:text-white transition-colors group" href="#">
<span class="material-icons-round text-3xl group-hover:scale-110 transition-transform">receipt_long</span>
</a>
<a class="flex flex-col items-center justify-center w-full h-full text-gray-400 dark:text-gray-500 hover:text-primary dark:hover:text-white transition-colors group" href="#">
<span class="material-icons-round text-3xl group-hover:scale-110 transition-transform">person</span>
</a>
</div>
</nav>
</main>

</body></html>
