<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>A2B Shipper Dashboard Home</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#0F3D26", // Deep Forest Green
                        accent: "#D4A017", // Amber/Gold
                        "background-light": "#F5F5E9", // Ivory
                        "background-dark": "#121212", // Standard Dark Mode
                        "card-light": "#FFFFFF",
                        "card-dark": "#1E1E1E",
                        "text-primary-light": "#0F3D26",
                        "text-primary-dark": "#E5E7EB",
                        "text-secondary-light": "#4B5563",
                        "text-secondary-dark": "#9CA3AF",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        'xl': '0.75rem',
                        '2xl': '1rem',
                        '3xl': '1.5rem',
                    },
                    boxShadow: {
                        'soft': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                    }
                },
            },
        };
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display h-screen flex justify-center overflow-hidden text-text-primary-light dark:text-text-primary-dark antialiased transition-colors duration-200">
<div class="w-full max-w-md h-full flex flex-col bg-background-light dark:bg-background-dark relative shadow-2xl overflow-hidden">
<header class="bg-primary pt-12 pb-6 px-6 rounded-b-3xl shadow-lg relative z-10">
<div class="flex justify-between items-start">
<div class="flex flex-col">
<h1 class="text-white text-xl font-bold tracking-tight">Hello, Musa Hardware</h1>
<p class="text-green-100 text-sm mt-1 opacity-90">Manage your shipments</p>
</div>
<button class="text-white p-2 rounded-full hover:bg-white/10 transition-colors relative">
<span class="material-icons-round">notifications_none</span>
<span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border border-primary"></span>
</button>
</div>
</header>
<main class="flex-1 overflow-y-auto px-5 pt-6 pb-24 space-y-6">
<div class="bg-[#D97706] dark:bg-[#B45309] rounded-2xl p-5 shadow-soft text-white relative overflow-hidden group">
<div class="absolute -right-4 -top-4 bg-white/10 w-24 h-24 rounded-full blur-xl"></div>
<div class="flex items-center gap-2 mb-2">
<span class="material-icons-round text-xl">warning_amber</span>
<span class="font-bold tracking-wide text-sm uppercase">Action Required</span>
</div>
<p class="text-white/90 text-sm mb-4 leading-relaxed font-medium">
                    Driver Found for Jinja Load! Payment needed to unlock.
                </p>
<button class="w-full bg-white text-[#D97706] dark:text-[#B45309] font-bold py-3 rounded-xl shadow-sm text-sm active:scale-[0.98] transition-transform flex items-center justify-center gap-2 uppercase tracking-wide">
                    Pay to Unlock Driver
                    <span class="material-icons-round text-base">arrow_forward</span>
</button>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="bg-card-light dark:bg-card-dark rounded-2xl p-4 shadow-soft flex flex-col items-center justify-center py-6 border border-gray-100 dark:border-gray-800">
<span class="text-3xl font-bold text-primary dark:text-white mb-1">2</span>
<span class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Active Loads</span>
</div>
<div class="bg-card-light dark:bg-card-dark rounded-2xl p-4 shadow-soft flex flex-col items-center justify-center py-6 border border-gray-100 dark:border-gray-800">
<span class="text-3xl font-bold text-primary dark:text-white mb-1">1</span>
<span class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Pending Load</span>
</div>
</div>
<div class="w-full">
<button class="w-full bg-primary hover:bg-[#0b2e1d] text-white rounded-2xl py-4 px-6 shadow-lg shadow-primary/20 flex items-center justify-center gap-3 group active:scale-[0.99] transition-all">
<span class="material-icons-round group-hover:rotate-90 transition-transform">add</span>
<span class="font-bold tracking-wide uppercase">Post a New Load</span>
</button>
<p class="text-center text-xs text-gray-400 dark:text-gray-500 mt-3 font-medium">
                    Get a driver in ~15 mins. Free to post.
                </p>
</div>
<div class="pt-2">
<div class="flex justify-between items-center mb-3 px-1">
<h3 class="text-primary dark:text-white font-bold text-lg">Recent Activity</h3>
<button class="text-primary dark:text-green-400 text-sm font-medium hover:underline">View All</button>
</div>
<div class="bg-card-light dark:bg-card-dark rounded-2xl p-4 shadow-soft border border-gray-100 dark:border-gray-800 flex items-center gap-4 mb-3">
<div class="bg-green-100 dark:bg-green-900/30 w-10 h-10 rounded-full flex items-center justify-center text-primary dark:text-green-400 shrink-0">
<span class="material-icons-round text-lg">local_shipping</span>
</div>
<div class="flex-1">
<h4 class="font-semibold text-sm text-gray-900 dark:text-white">Kampala to Jinja</h4>
<p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Order #2938 • In Transit</p>
</div>
<span class="text-xs font-bold text-gray-400 dark:text-gray-500">2h ago</span>
</div>
</div>
</main>
<nav class="bg-card-light dark:bg-card-dark border-t border-gray-100 dark:border-gray-800 pb-8 pt-2 px-6 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.02)] relative z-20">
<div class="flex justify-between items-end">
<button class="flex flex-col items-center justify-center w-16 group">
<div class="w-12 h-0.5 bg-primary dark:bg-white rounded-full mb-2 opacity-100 transition-opacity"></div>
<span class="material-icons-round text-primary dark:text-white text-2xl mb-1 group-hover:scale-110 transition-transform">home</span>
<span class="text-xs font-bold text-primary dark:text-white">Home</span>
</button>
<button class="flex flex-col items-center justify-center w-16 group opacity-50 hover:opacity-100 transition-opacity">
<div class="w-12 h-0.5 bg-transparent rounded-full mb-2"></div>
<span class="material-icons-round text-gray-600 dark:text-gray-400 text-2xl mb-1 group-hover:scale-110 transition-transform">receipt_long</span>
<span class="text-xs font-medium text-gray-600 dark:text-gray-400">Receipts</span>
</button>
<button class="flex flex-col items-center justify-center w-16 group opacity-50 hover:opacity-100 transition-opacity">
<div class="w-12 h-0.5 bg-transparent rounded-full mb-2"></div>
<span class="material-icons-round text-gray-600 dark:text-gray-400 text-2xl mb-1 group-hover:scale-110 transition-transform">person_outline</span>
<span class="text-xs font-medium text-gray-600 dark:text-gray-400">Account</span>
</button>
</div>
</nav>
</div>

</body></html>
